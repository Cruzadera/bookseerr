<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bookseerr</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">bookseerr</p>
        <h1>Search, download, and auto-import books in one place.</h1>
        <p class="subtitle">
          Powered by Prowlarr, qBittorrent, and Calibre-Web.
        </p>
      </section>

      <section class="panel">
        <div class="search-row">
          <label class="field">
            <span>Book title</span>
            <input
              id="search"
              type="text"
              placeholder="Search by title or author"
              autocomplete="off"
            />
          </label>
          <div class="actions">
            <button id="search-button" type="button">Search</button>
            <button id="request-button" type="button" class="secondary">
              Download best
            </button>
          </div>
        </div>

        <p id="status" class="status" role="status" aria-live="polite"></p>

        <div id="results" class="results"></div>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
